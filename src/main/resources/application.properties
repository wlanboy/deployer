spring.application.name=deployer
management.endpoints.web.exposure.include=health,info,metrics,prometheus
info.app.name=Deployment Lifecycle Manager
info.app.description=Verwaltet Ansible Repros und Deployments

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./deployerdb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.h2.console.enabled=false
